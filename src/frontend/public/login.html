<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T2AutoTron - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
            text-align: center;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .error-message.show {
            display: block;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hint {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>T2AutoTron</h1>
            <p>Smart Home Automation</p>
        </div>

        <div id="error-message" class="error-message"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="pin">Enter PIN</label>
                <input 
                    type="password" 
                    id="pin" 
                    name="pin" 
                    placeholder="••••" 
                    maxlength="6" 
                    pattern="[0-9]*" 
                    inputmode="numeric"
                    autocomplete="off"
                    required
                    autofocus
                >
            </div>

            <button type="submit" class="btn" id="login-btn">
                <span id="btn-text">Login</span>
            </button>
        </form>

        <p class="hint">Enter your 4-6 digit PIN to access the system</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const form = document.getElementById('login-form');
        const pinInput = document.getElementById('pin');
        const loginBtn = document.getElementById('login-btn');
        const btnText = document.getElementById('btn-text');
        const errorMessage = document.getElementById('error-message');

        // Connect to Socket.IO
        const socket = io('http://localhost:3000', {
            transports: ['websocket', 'polling']
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 3000);
        }

        function setLoading(loading) {
            if (loading) {
                loginBtn.disabled = true;
                btnText.innerHTML = 'Authenticating<span class="loading"></span>';
            } else {
                loginBtn.disabled = false;
                btnText.textContent = 'Login';
            }
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const pin = pinInput.value.trim();

            if (!pin || pin.length < 4) {
                showError('PIN must be at least 4 digits');
                return;
            }

            setLoading(true);
            socket.emit('authenticate', pin);
        });

        socket.on('auth-success', () => {
            // Store authentication in sessionStorage
            sessionStorage.setItem('authenticated', 'true');
            sessionStorage.setItem('authTime', Date.now());
            
            // Redirect to main app
            window.location.href = '/';
        });

        socket.on('auth-failed', (data) => {
            setLoading(false);
            showError(data.error || 'Invalid PIN');
            pinInput.value = '';
            pinInput.focus();
        });

        socket.on('connect_error', () => {
            showError('Cannot connect to server');
            setLoading(false);
        });

        // Only allow numeric input
        pinInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
